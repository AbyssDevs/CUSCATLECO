                </div>

            </div>

            <!-- EMPLEADOS -->

            <div id="empleados">

                <h2>Registrar empleado</h2>

                <div class="admin-empleados-form">
                    <input type="text" id="usuario_nombre" placeholder="Nombre completo">
                    <input type="text" id="usuario_email" placeholder="Email">
                    <input type="password" id="usuario_password" placeholder="Contraseña">
                    <select id="rol_nombre">
                        <option value="administrador">Administrador</option>
                        <option value="Mesero">Mesero</option>
                        <option value="Cajero">Cajero</option>
                        <option value="Cocina">Cocina</option>
                    </select>
                    <button onclick="registrarEmpleado()">Registrar empleado</button>
                </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');

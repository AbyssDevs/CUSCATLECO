<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada - Sabor Cuscatleco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #2c0202 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      margin: 20px;
      animation: slideIn 0.5s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .error-code { font-size: 8rem; font-weight: 800; color: #dc3545; line-height: 1; margin-bottom: 0.5rem; text-shadow: 3px 3px 0 rgba(220,53,69,0.2); }
    h1 { color: #333; font-size: 2rem; margin-bottom: 0.5rem; font-weight: 600; }
    .divider { width: 80px; height: 4px; background: linear-gradient(90deg, #dc3545, #ff6b6b); margin: 1.5rem auto; border-radius: 2px; }
    p { color: #666; font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      padding: 0.8rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-block;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
    .btn-outline {
      background: transparent;
      border-color: #667eea;
      color: #667eea;
    }
    .btn-outline:hover { background: #667eea; color: white; }
    .icon { font-size: 4rem; margin-bottom: 1rem; display: inline-block; background: #fff5f5; width: 100px; height: 100px; line-height: 100px; border-radius: 50%; color: #dc3545; }
    @media (max-width: 480px) {
      .container { padding: 2rem; }
      .error-code { font-size: 6rem; }
      h1 { font-size: 1.5rem; }
      .btn { width: 100%; }
    }
    .footer { margin-top: 2rem; font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔍</div>
    <div class="error-code">404</div>
    <h1>Página no encontrada</h1>
    <div class="divider"></div>
    <p>La página que buscas no existe o ha sido movida.</p>
    <div class="button-group">
      <button id="btnDashboard" class="btn btn-primary" style="display:none;">Ir a mi dashboard</button>
      <button id="btnLogin" class="btn btn-outline">Volver al login</button>
    </div>
    <div class="footer">⚡ Restaurante Sabor Cuscatleco - Sistema POS</div>
  </div>

  <script>
    document.getElementById("btnLogin").addEventListener("click", () => {
      window.location.href = "/";
    });

    (async () => {
      try {
        const res = await fetch("/api/usuario");
        if (!res.ok) throw new Error("No session");
        const user = await res.json();

        const btnDashboard = document.getElementById("btnDashboard");
        const rutas = {
          Administrador: "/admin",
          Mesero: "/mesero",
          Cocina: "/cocina",
          Cajero: "/cajero"
        };
        const ruta = rutas[user.rol];
        if (ruta) {
          btnDashboard.style.display = "inline-block";
          btnDashboard.textContent = "Ir a mi dashboard";
          btnDashboard.addEventListener("click", () => { window.location.href = ruta; });
        }
      } catch (e) {
        // No session - botón de login ya está visible
      }
    })();
  </script>
</body>
</html>

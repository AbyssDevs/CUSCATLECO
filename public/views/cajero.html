<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cajero</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- CSS Específico de Cajero -->
    <link rel="stylesheet" href="../css/cajero.css">
    <link rel="stylesheet" href="../css/menu.css">

</head>

<body>

    <div class="dashboard">

        <!-- BARRA LATERAL -->
        <div class="sidebar" id="sidebar">

            <h2>RESTAURANTE CUSCATLECO</h2>

            <div class="user-info" id="userInfo">
                <div class="user-avatar">
                    <i class="fa-solid fa-cash-register"></i>
                </div>
                <div class="user-details">
                    <span class="user-name" id="userName">Cargando...</span>
                    <!-- Role label as Cajero -->
                    <span class="user-role" id="userRole">Cajero</span>
                </div>
            </div>

            <ul>
                <li onclick="mostrarViews('cobros')"><i class="fa-solid fa-receipt"></i> Facturar y Cobrar</li><br>
                <li onclick="mostrarViews('menu-restaurante')"><i class="fa-solid fa-book-open"></i> Ver el Menú</li><br>
                <li onclick="mostrarViews('tomar-pedido')"><i class="fa-solid fa-plus"></i> Nuevo Pedido</li><br>
                <li onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</li><br>
            </ul>

        </div>

        <div class="backdrop" id="menuBackdrop" onclick="toggleMenu()"></div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="contenido">

            <div class="header-mobile">
                <button class="hamburger" onclick="toggleMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>

            <!-- COBROS (Dashboard principal) -->
            <div id="cobros">

                <h1>Cobrar Órdenes</h1>
                <p id="bienvenidaUsuario"></p>
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <input type="text" id="buscarMesaCobro" placeholder="Buscar por mesa..." style="flex: 1;">
                </div>

                <table border="1">
                    <thead>
                        <tr>
                            <th>ID Orden</th>
                            <th>Mesa</th>
                            <th>Mesero</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCobros">
                        <!-- Ejemplo de render -->
                        <!--
                        <tr>
                            <td>#1002</td>
                            <td>Mesa 3</td>
                            <td>Juan Perez</td>
                            <td>$15.50</td>
                            <td><span class="pendiente">Pendiente de Pago</span></td>
                            <td>
                                <button class="btn-completar">Facturar y Cobrar</button>
                            </td>
                        </tr>
                        -->
                    </tbody>
                </table>

            </div>

            <!-- VER MENÚ -->
            <div id="menu-restaurante" style="display: none;">
                <h1>Menú del Restaurante</h1>

                <div class="menu-page-header">
                    <select id="menuCategoryFilter">
                        <option value="">Todas las categorías</option>
                    </select>
                    <input id="menuSearchInput" type="text" placeholder="Buscar platillo..." autocomplete="off">
                </div>

                <div id="menuLoading" class="menu-loading">
                    <span class="spinner"></span>
                    <span>Cargando menú...</span>
                </div>
                <div id="menuEmpty" class="menu-empty"></div>

                <table class="menu-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th data-sort="nombre" class="sortable">Nombre <span class="sort-indicator"></span></th>
                            <th>Categoría</th>
                            <th>Descripción</th>
                            <th data-sort="precio" class="sortable">Precio <span class="sort-indicator"></span></th>
                            
                        </tr>
                    </thead>
                    <tbody id="menuTableBody"></tbody>
                </table>

                <div id="menuCardList" class="menu-card-list"></div>
            </div>

            <!-- TOMAR PEDIDO -->
            <div id="tomar-pedido" style="display: none;">
                <h1>Tomar Pedido Nuevo</h1>

                <form id="formPedidoCajero" style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px;">
                    <div class="tipo-pedido-selector">
                        <button type="button" class="pedido-type-btn active" data-tipo="llevar">
                            <i class="fas fa-bag-shopping"></i>
                            Para llevar
                        </button>
                        <button type="button" class="pedido-type-btn" data-tipo="salon">
                            <i class="fas fa-chair"></i>
                            Comer aquí
                        </button>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label for="nombreClienteCajero">Nombre del Cliente *</label>
                        <input type="text" id="nombreClienteCajero" placeholder="Nombre del cliente">
                    </div>

                    <div class="form-group">
                        <label for="telefonoClienteCajero">Teléfono</label>
                        <input type="tel" id="telefonoClienteCajero" placeholder="Teléfono del cliente (Opcional)">
                    </div>

                    <div class="form-group">
                        <label for="mesaPedidoCajero">Mesa</label>
                        <select id="mesaPedidoCajero" disabled>
                            <option value="">Sin mesa (Para llevar)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="observacionesPedidoCajero">Observaciones</label>
                        <textarea id="observacionesPedidoCajero" rows="4" placeholder="Notas especiales - Opcional"></textarea>
                    </div>

                    <button type="submit" class="btn-enviar-pedido">
                        <i class="fas fa-paper-plane"></i>
                        Iniciar pedido
                    </button>
                </form>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/alerts.js"></script>
    <script src="../js/menu.js"></script>
    
</body>

</html>
